<!DOCTYPE html>
<html>
<head>
    <title>Online Luk Boutique</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #5f2c82, #9b59b6);
            color: white;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        nav {
            text-align: center;
            padding: 15px;
            background-color: rgba(0,0,0,0.3);
        }

        nav a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-weight: 600;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 50px 20px;
            flex-wrap: wrap;
        }

        .product {
            background-color: white;
            color: black;
            padding: 20px;
            width: 220px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .product img {
            width: 100%;
            border-radius: 10px;
        }

        .product h3 {
            margin: 15px 0 5px 0;
        }

        .product p {
            font-weight: bold;
            color: #5f2c82;
        }

        footer {
            text-align: center;
            padding: 30px;
            background-color: rgba(0,0,0,0.3);
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    <h1>Online Luk Boutique</h1>
    <p>Modern Fashion. Bold Style.</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
</nav>

<section class="products">

    <div class="product">
        <img src="hoodie.jpg">
        <h3>Classic Hoodie</h3>
        <p>$39.99</p>
    </div>

    <div class="product">
        <img src="shirt.jpg">
        <h3>Street Shirt</h3>
        <p>$29.99</p>
    </div>

    <div class="product">
        <img src="jacket.jpg">
        <h3>Urban Jacket</h3>
        <p>$59.99</p>
    </div>

</section>

<footer>
    <p>This website is secured with HTTPS using a free Let's Encrypt certificate.</p>
</footer>

</body>
</html>
